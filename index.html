<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WeatherSync">
<link rel="manifest" href="manifest.json">
<title>WeatherSync</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:#06101e}
#cvs{position:fixed;inset:0;z-index:0;width:100%;height:100%}
#app{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;padding:env(safe-area-inset-top,22px) 14px 14px;gap:10px;overflow-y:auto}
.card{background:rgba(0,0,0,0.38);backdrop-filter:blur(28px) saturate(150%);-webkit-backdrop-filter:blur(28px) saturate(150%);border:1px solid rgba(255,255,255,0.13);border-radius:22px;padding:16px 18px;color:#fff;box-shadow:0 4px 32px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.08);animation:su .5s cubic-bezier(.4,0,.2,1) both}
.card:nth-child(3){animation-delay:.07s}.card:nth-child(4){animation-delay:.14s}.card:nth-child(5){animation-delay:.21s}
@keyframes su{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
/* TOP BAR */
#tb{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.tl{display:flex;flex-direction:column;gap:3px}
.tr{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.loc{display:flex;align-items:center;gap:4px;opacity:.85}
.locn{font-size:13px;font-weight:500;color:#fff}
.dstr{font-size:10px;font-weight:500;color:rgba(255,255,255,.55);letter-spacing:.4px;text-transform:uppercase}
.langs{display:flex;gap:4px;margin-top:1px}
.lb{font-size:10px;font-weight:700;letter-spacing:.6px;padding:3px 8px;border-radius:20px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.lb.on{background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.38)}
.lb:active{transform:scale(.92)}
.clk{font-family:'DM Mono',monospace;font-size:46px;font-weight:400;color:#fff;line-height:1;letter-spacing:-1px;cursor:pointer;text-shadow:0 2px 20px rgba(0,0,0,.5)}
.clk:active{opacity:.7}
.csec{font-size:20px;opacity:.38;vertical-align:super;margin-left:2px}
.calbtn{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:5px 11px;color:rgba(255,255,255,.7);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.calbtn:active{opacity:.7}
/* LOADING */
.lbar{height:2px;border-radius:1px;background:rgba(255,255,255,.07);overflow:hidden;transition:opacity .3s;flex-shrink:0}
.lbar.h{opacity:0;pointer-events:none}
.lbar::after{content:'';display:block;height:100%;width:32%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent);animation:ls 1.1s ease-in-out infinite}
@keyframes ls{from{margin-left:-32%}to{margin-left:110%}}
/* MAIN CARD */
.mtop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.tgiant{font-family:'DM Mono',monospace;font-size:68px;font-weight:300;line-height:1;letter-spacing:-2px;text-shadow:0 4px 24px rgba(0,0,0,.4);transition:all .5s}
.wibig{font-size:60px;line-height:1;filter:drop-shadow(0 3px 10px rgba(0,0,0,.4));animation:fl 3s ease-in-out infinite;flex-shrink:0}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.cond{font-size:15px;font-weight:500;opacity:.9;margin-bottom:3px}
.feels{font-size:13px;opacity:.6;margin-bottom:12px}
.fv{font-weight:600;opacity:1;color:#fff}
.badges{display:flex;gap:4px;flex-wrap:wrap}
.bdg{font-size:9px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.09);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.12)}
.bdg.ok{background:rgba(74,222,128,.13);color:#86efac;border-color:rgba(74,222,128,.22)}
.bdg.fail{background:rgba(248,113,113,.11);color:#fca5a5;border-color:rgba(248,113,113,.2)}
/* STATS */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.sbox{background:rgba(255,255,255,.07);border-radius:15px;padding:11px 13px;border:1px solid rgba(255,255,255,.07)}
.slbl{font-size:9px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;opacity:.45;margin-bottom:4px}
.sico{font-size:18px;margin-bottom:3px}
.sval{font-size:19px;font-weight:600;color:#fff;line-height:1}
.ssub{font-size:10px;opacity:.4;margin-top:2px}
/* SUN */
.srow{display:flex;align-items:center;gap:10px}
.sasvg{flex:1;overflow:visible}
.stimes{display:flex;gap:14px;margin-left:auto}
.sti{text-align:center}
.stv{font-family:'DM Mono',monospace;font-size:15px;font-weight:500}
.stl{font-size:9px;opacity:.45;letter-spacing:.5px;text-transform:uppercase}
/* OVERLAYS */
.ov{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.68);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.ov.open{opacity:1;pointer-events:all}
.sh{width:100%;max-width:480px;background:rgba(10,20,35,.96);border:1px solid rgba(255,255,255,.1);border-radius:22px 22px 0 0;padding-bottom:env(safe-area-inset-bottom,20px);transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);max-height:86vh;overflow-y:auto;color:#fff}
.ov.open .sh{transform:translateY(0)}
.hdl{width:34px;height:4px;border-radius:2px;background:rgba(255,255,255,.18);margin:11px auto 0;cursor:pointer}
.shtit{font-size:14px;font-weight:700;padding:13px 18px 9px;border-bottom:1px solid rgba(255,255,255,.07)}
/* ALARM LIST */
.alist{padding:9px 12px}
.aitem{display:flex;align-items:center;justify-content:space-between;padding:12px 13px;border-radius:13px;margin-bottom:7px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07)}
.atim{font-family:'DM Mono',monospace;font-size:23px;font-weight:500}
.albl{font-size:11px;opacity:.45;margin-top:2px}
.ar{display:flex;align-items:center;gap:7px}
.adel{width:29px;height:29px;border-radius:50%;border:1px solid rgba(248,113,113,.28);background:rgba(248,113,113,.09);color:#fca5a5;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.adel:active{transform:scale(.88)}
.addbtn{display:flex;align-items:center;justify-content:center;gap:5px;margin:3px 12px 7px;padding:12px;border-radius:13px;border:1px dashed rgba(255,255,255,.18);background:rgba(255,255,255,.04);color:rgba(255,255,255,.45);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.addbtn:active{opacity:.7}
/* TOGGLE */
.tog{position:relative;width:40px;height:23px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;border-radius:12px;background:rgba(255,255,255,.14);cursor:pointer;transition:.25s}
.tsl::before{content:'';position:absolute;width:17px;height:17px;border-radius:50%;background:#fff;bottom:3px;left:3px;transition:.25s}
.tog input:checked+.tsl{background:#34d399}
.tog input:checked+.tsl::before{transform:translateX(17px)}
/* TIME PICKER */
.tpick{display:flex;align-items:center;justify-content:center;gap:10px;padding:20px 16px 12px}
.tpcol{display:flex;flex-direction:column;align-items:center;gap:6px}
.tpv{font-family:'DM Mono',monospace;font-size:42px;font-weight:500;color:#fff;line-height:1}
.tpb{width:36px;height:29px;border-radius:8px;border:1px solid rgba(255,255,255,.11);background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;font-family:'DM Sans',sans-serif}
.tpb:active{opacity:.6}
.tpsep{font-family:'DM Mono',monospace;font-size:42px;font-weight:300;color:rgba(255,255,255,.35)}
.alinp{margin:0 12px 11px;padding:10px 13px;border-radius:11px;width:calc(100% - 24px);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.alinp::placeholder{opacity:.3}
.macts{display:flex;gap:7px;padding:0 12px 3px}
.mbp{flex:1;padding:12px;border-radius:12px;border:none;background:#34d399;color:#0a1f14;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.mbp:active{opacity:.8}
.mbs{flex:1;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.11);background:transparent;color:rgba(255,255,255,.7);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.mbs:active{opacity:.7}
/* CALENDAR */
.chead{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 7px}
.cnav{width:29px;height:29px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.cnav:active{opacity:.7}
.cmth{font-size:14px;font-weight:700}
.cgrid{padding:0 12px 9px;display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cdow{text-align:center;font-size:9px;font-weight:700;letter-spacing:.5px;opacity:.3;padding:3px 0;text-transform:uppercase}
.cday{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:12px;font-weight:400;color:#fff;cursor:pointer;transition:all .15s}
.cday:hover{background:rgba(255,255,255,.1)}
.cday.today{background:#34d399;color:#082015;font-weight:700}
.cday.om{opacity:.18}
.err{font-size:11px;color:#fca5a5;text-align:center;padding:5px;opacity:.85}
.err:empty{display:none}
</style>
</head>
<body>
<canvas id="cvs"></canvas>
<div id="app">

  <!-- TOP BAR -->
  <div id="tb">
    <div class="tl">
      <div class="loc"><span style="font-size:11px">📍</span><span class="locn" id="locn">—</span></div>
      <div class="dstr" id="dstr">—</div>
      <div class="langs">
        <button class="lb on" data-lang="es">ES</button>
        <button class="lb" data-lang="en">EN</button>
        <button class="lb" data-lang="pt">PT</button>
      </div>
    </div>
    <div class="tr">
      <div class="clk" id="clk"><span id="cf">--:--</span><span class="csec" id="cs">--</span></div>
      <button class="calbtn" id="calBtn">📅</button>
    </div>
  </div>

  <!-- LOADING -->
  <div class="lbar h" id="lb"></div>

  <!-- MAIN CARD -->
  <div class="card">
    <div class="mtop">
      <div class="tgiant" id="tg">--°</div>
      <div class="wibig" id="wi">🌡️</div>
    </div>
    <div class="cond" id="cond">—</div>
    <div class="feels" id="feels">—</div>
    <div class="badges">
      <span class="bdg" id="bg">GFS</span>
      <span class="bdg" id="be">ECMWF</span>
      <span class="bdg" id="bw">WTTR</span>
    </div>
  </div>

  <!-- STATS -->
  <div class="card">
    <div class="sgrid">
      <div class="sbox">
        <div class="slbl" id="lt-wind">VIENTO</div>
        <div class="sico">💨</div>
        <div class="sval" id="sv-wind">--</div>
        <div class="ssub" id="sv-wdir">--</div>
      </div>
      <div class="sbox">
        <div class="slbl" id="lt-hum">HUMEDAD</div>
        <div class="sico">💧</div>
        <div class="sval" id="sv-hum">--%</div>
        <div class="ssub" id="lt-rel">relativa</div>
      </div>
      <div class="sbox">
        <div class="slbl" id="lt-prec">PRECIPIT.</div>
        <div class="sico">🌧️</div>
        <div class="sval" id="sv-prec">-- mm</div>
        <div class="ssub" id="lt-ph">/ hora</div>
      </div>
      <div class="sbox">
        <div class="slbl" id="lt-pres">PRESIÓN</div>
        <div class="sico">🔵</div>
        <div class="sval" id="sv-pres">--</div>
        <div class="ssub" id="lt-surf">hPa</div>
      </div>
    </div>
  </div>

  <!-- SUN -->
  <div class="card">
    <div class="srow">
      <div style="flex:1">
        <div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:.4;margin-bottom:7px" id="lt-arc">ARCO SOLAR</div>
        <svg class="sasvg" id="sasvg" viewBox="0 0 200 65" preserveAspectRatio="xMidYMid meet">
          <defs><filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
          <path d="M10,60 Q100,-5 190,60" fill="none" stroke="rgba(255,255,255,.11)" stroke-width="1.5" stroke-dasharray="4 4"/>
          <path id="ap" d="M10,60" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
          <circle id="sd" cx="10" cy="60" r="5.5" fill="#fbbf24" filter="url(#glow)"/>
        </svg>
      </div>
      <div class="stimes">
        <div class="sti"><div class="stv" id="sr">--:--</div><div class="stl" id="lt-sr">AMANECER</div></div>
        <div class="sti" style="text-align:right"><div class="stv" id="ss">--:--</div><div class="stl" id="lt-ss">OCASO</div></div>
      </div>
    </div>
  </div>

  <div class="err" id="err"></div>
</div>

<!-- ALARMS -->
<div class="ov" id="alOv">
  <div class="sh">
    <div class="hdl" onclick="co('alOv')"></div>
    <div class="shtit" id="lt-alarms">⏰ Alarmas</div>
    <div class="alist" id="alist"></div>
    <div class="addbtn" id="addbtn">+ <span id="lt-new">Nueva alarma</span></div>
  </div>
</div>

<!-- ADD ALARM -->
<div class="ov" id="addOv">
  <div class="sh">
    <div class="hdl" onclick="co('addOv')"></div>
    <div class="shtit" id="lt-new2">Nueva alarma</div>
    <div class="tpick">
      <div class="tpcol">
        <div class="tpb" id="hu">▲</div><div class="tpv" id="ph">07</div><div class="tpb" id="hd">▼</div>
      </div>
      <div class="tpsep">:</div>
      <div class="tpcol">
        <div class="tpb" id="mu">▲</div><div class="tpv" id="pm">00</div><div class="tpb" id="md">▼</div>
      </div>
    </div>
    <input class="alinp" id="alinp" maxlength="40">
    <div class="macts">
      <button class="mbs" onclick="co('addOv')" id="lt-cancel">Cancelar</button>
      <button class="mbp" id="savebtn" id="lt-save">Guardar</button>
    </div>
  </div>
</div>

<!-- CALENDAR -->
<div class="ov" id="calOv">
  <div class="sh">
    <div class="hdl" onclick="co('calOv')"></div>
    <div class="chead">
      <div class="cnav" id="cprev">&#8249;</div>
      <div class="cmth" id="cmth">—</div>
      <div class="cnav" id="cnext">&#8250;</div>
    </div>
    <div class="cgrid" id="cgrid"></div>
  </div>
</div>

<script>
// ═══════ I18N ═══════
const T={
  es:{
    wind:'VIENTO',hum:'HUMEDAD',prec:'PRECIPIT.',pres:'PRESIÓN',
    rel:'relativa',ph:'/ hora',surf:'hPa',
    arc:'ARCO SOLAR',sr:'AMANECER',ss:'OCASO',
    feels:'Sensación',alarms:'⏰ Alarmas',newAl:'Nueva alarma',cancel:'Cancelar',save:'Guardar',
    placeholder:'Etiqueta (opcional)',
    cond:{0:'Despejado',1:'Mayorm. despejado',2:'Parcialm. nublado',3:'Nublado',45:'Niebla',48:'Niebla',
      51:'Llovizna',53:'Llovizna',55:'Llovizna',61:'Lluvia',63:'Lluvia moderada',65:'Lluvia intensa',
      71:'Nieve',73:'Nieve moderada',75:'Nieve intensa',80:'Chubascos',81:'Chubascos',82:'Chubascos fuertes',
      85:'Nevadas',86:'Nevadas',95:'Tormenta',96:'Tormenta con granizo',99:'Tormenta'},
    days:['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'],
    months:['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'],
    ds:['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'],
    ms:['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC']
  },
  en:{
    wind:'WIND',hum:'HUMIDITY',prec:'PRECIP.',pres:'PRESSURE',
    rel:'relative',ph:'/ hour',surf:'hPa',
    arc:'SUN ARC',sr:'SUNRISE',ss:'SUNSET',
    feels:'Feels like',alarms:'⏰ Alarms',newAl:'New alarm',cancel:'Cancel',save:'Save',
    placeholder:'Label (optional)',
    cond:{0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Fog',
      51:'Drizzle',53:'Drizzle',55:'Drizzle',61:'Rain',63:'Moderate rain',65:'Heavy rain',
      71:'Snow',73:'Moderate snow',75:'Heavy snow',80:'Showers',81:'Showers',82:'Heavy showers',
      85:'Snow showers',86:'Snow showers',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'},
    days:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
    months:['January','February','March','April','May','June','July','August','September','October','November','December'],
    ds:['SUN','MON','TUE','WED','THU','FRI','SAT'],
    ms:['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC']
  },
  pt:{
    wind:'VENTO',hum:'HUMIDADE',prec:'PRECIPIT.',pres:'PRESSÃO',
    rel:'relativa',ph:'/ hora',surf:'hPa',
    arc:'ARCO SOLAR',sr:'NASCER',ss:'PÔR DO SOL',
    feels:'Sensação',alarms:'⏰ Alarmes',newAl:'Novo alarme',cancel:'Cancelar',save:'Salvar',
    placeholder:'Rótulo (opcional)',
    cond:{0:'Céu limpo',1:'Maiorm. limpo',2:'Parcialm. nublado',3:'Nublado',45:'Nevoeiro',48:'Nevoeiro',
      51:'Garoa',53:'Garoa',55:'Garoa',61:'Chuva',63:'Chuva moderada',65:'Chuva intensa',
      71:'Neve',73:'Neve moderada',75:'Neve intensa',80:'Pancadas',81:'Pancadas',82:'Pancadas fortes',
      85:'Neve',86:'Neve',95:'Trovoada',96:'Trovoada c/ granizo',99:'Trovoada'},
    days:['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'],
    months:['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'],
    ds:['DOM','SEG','TER','QUA','QUI','SEX','SÁB'],
    ms:['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ']
  }
};

const S={
  lang:localStorage.getItem('ws_lang')||'es',
  unit:localStorage.getItem('ws_unit')||'C',
  alarms:JSON.parse(localStorage.getItem('ws_alarms')||'[]'),
  lat:null,lon:null,weather:null,sunrise:null,sunset:null,
  calY:new Date().getFullYear(),calM:new Date().getMonth(),
  ph:7,pm:0,prevScene:''
};

const p2=n=>String(n).padStart(2,'0');
const tl=k=>T[S.lang][k]||T.es[k]||k;

// ═══════ CANVAS SCENE ═══════
const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');
let parts=[],curScene='',lastLtng=0;

function rsz(){cvs.width=window.innerWidth;cvs.height=window.innerHeight;}
window.addEventListener('resize',()=>{rsz();initParts(curScene);});
rsz();

const SCENES={
  'sd':{sky:['#1575c8','#2e9de0','#74c8f5']},   // sunny day
  'sn':{sky:['#05101d','#0c1f34','#091828']},    // starry night
  'cd':{sky:['#3a6e95','#5590b5','#78aac8']},    // cloudy day
  'cn':{sky:['#0c1824','#182535','#1c2c3e']},    // cloudy night
  'oc':{sky:['#2e3d4a','#3c4d5c','#475a6a']},    // overcast
  'dz':{sky:['#253040','#2e3c4e','#384860']},    // drizzle
  'rn':{sky:['#182230','#1e2c3c','#243448']},    // rain
  'st':{sky:['#0a0f18','#10161f','#141c28']},    // storm
  'sw':{sky:['#243450','#304060','#3c5072']},    // snow
  'fg':{sky:['#334050','#405060','#4e5f70']}     // fog
};

function getScene(code,isDay){
  if(code===0||code===1)return isDay?'sd':'sn';
  if(code===2)return isDay?'cd':'cn';
  if(code===3)return 'oc';
  if(code===45||code===48)return 'fg';
  if(code>=51&&code<=57)return 'dz';
  if(code>=61&&code<=67)return 'rn';
  if(code>=71&&code<=77)return 'sw';
  if(code>=80&&code<=82)return 'rn';
  if(code>=85&&code<=86)return 'sw';
  if(code>=95)return 'st';
  return isDay?'cd':'cn';
}

function initParts(scene){
  parts=[];
  const W=cvs.width,H=cvs.height;
  if(scene==='sn'){
    for(let i=0;i<140;i++)parts.push({t:'star',x:Math.random()*W,y:Math.random()*H*.85,r:Math.random()*1.6+.3,ph:Math.random()*Math.PI*2});
  }
  if(scene==='rn'||scene==='dz'||scene==='st'){
    const cnt=scene==='st'?220:scene==='rn'?160:70;
    const spd=scene==='st'?14:scene==='rn'?9:4.5;
    const len=scene==='st'?22:scene==='rn'?16:7;
    for(let i=0;i<cnt;i++)parts.push({t:'rain',x:Math.random()*W*1.5-W*.25,y:Math.random()*H,spd,len,a:scene==='dz'?.2:.45});
  }
  if(scene==='sw'){
    for(let i=0;i<95;i++)parts.push({t:'snow',x:Math.random()*W,y:Math.random()*H,r:Math.random()*2.5+1.2,spd:Math.random()*1.1+.4,drift:Math.random()*.7-.35,ph:Math.random()*Math.PI*2,a:Math.random()*.6+.3});
  }
  if(scene==='fg'){
    for(let i=0;i<7;i++)parts.push({t:'fog',x:Math.random()*W*2-W*.5,y:H*.35+Math.random()*H*.4,w:Math.random()*380+260,h:Math.random()*55+35,spd:Math.random()*.25+.08,a:Math.random()*.1+.05});
  }
  const cldMap={sd:3,cd:4,cn:3,oc:7,dz:4,rn:5,st:9,sn:0,sw:0,fg:0};
  const cnt=cldMap[scene]||0;
  const dark=['oc','rn','st','cn','dz'].includes(scene);
  for(let i=0;i<cnt;i++)parts.push({t:'cloud',x:Math.random()*W*1.6-W*.3,y:Math.random()*H*.42,w:Math.random()*200+110,h:Math.random()*65+38,spd:Math.random()*.14+.04,a:dark?.4:.28,dark});
  curScene=scene;
}

function drawFrame(ts){
  const W=cvs.width,H=cvs.height;
  const sc=SCENES[curScene]||SCENES.cd;
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,sc.sky[0]);g.addColorStop(.5,sc.sky[1]);g.addColorStop(1,sc.sky[2]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // Sun disk
  if(curScene==='sd'||curScene==='cd'){
    const sx=W*.74,sy=H*.17;
    const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,100);
    sg.addColorStop(0,'rgba(255,248,180,.45)');sg.addColorStop(1,'rgba(255,220,60,0)');
    ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);
    const dg=ctx.createRadialGradient(sx,sy,0,sx,sy,32);
    dg.addColorStop(0,'rgba(255,248,200,.95)');dg.addColorStop(.7,'rgba(255,215,70,.8)');dg.addColorStop(1,'rgba(255,200,50,.3)');
    ctx.beginPath();ctx.arc(sx,sy,32,0,Math.PI*2);ctx.fillStyle=dg;ctx.fill();
  }
  // Moon
  if(curScene==='sn'){
    const mx=W*.78,my=H*.12;
    const mg=ctx.createRadialGradient(mx,my,0,mx,my,26);
    mg.addColorStop(0,'rgba(215,228,255,.88)');mg.addColorStop(1,'rgba(180,200,240,.2)');
    ctx.beginPath();ctx.arc(mx,my,26,0,Math.PI*2);ctx.fillStyle=mg;ctx.fill();
    ctx.beginPath();ctx.arc(mx+10,my-3,22,0,Math.PI*2);ctx.fillStyle=sc.sky[1];ctx.fill();
  }
  // Lightning
  if(curScene==='st'&&ts-lastLtng>3500+Math.random()*4000){
    lastLtng=ts;
    ctx.fillStyle='rgba(200,220,255,.06)';ctx.fillRect(0,0,W,H);
    const lx=W*.3+Math.random()*W*.4;
    ctx.strokeStyle='rgba(190,215,255,.88)';ctx.lineWidth=1.8;ctx.shadowColor='#a0c8ff';ctx.shadowBlur=14;
    ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx-18,H*.28);ctx.lineTo(lx+8,H*.28);ctx.lineTo(lx-28,H*.62);ctx.stroke();
    ctx.shadowBlur=0;
  }

  parts.forEach(p=>{
    ctx.globalAlpha=p.a||1;
    if(p.t==='star'){
      p.ph+=.035;const b=.35+.65*Math.abs(Math.sin(p.ph));
      ctx.globalAlpha=b*.88;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    } else if(p.t==='rain'){
      p.y+=p.spd;p.x+=p.spd*.18;
      if(p.y>H+30){p.y=-20;p.x=Math.random()*W*1.5-W*.25;}
      ctx.strokeStyle=`rgba(180,210,255,${p.a})`;ctx.lineWidth=.75;
      ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+p.spd*.18*2,p.y+p.len);ctx.stroke();
    } else if(p.t==='snow'){
      p.ph+=.02;p.y+=p.spd;p.x+=Math.sin(p.ph)*p.drift;
      if(p.y>H+10){p.y=-10;p.x=Math.random()*W;}
      ctx.fillStyle=`rgba(225,238,255,${p.a})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    } else if(p.t==='fog'){
      p.x+=p.spd;if(p.x>W+p.w*.5)p.x=-p.w*.5;
      const fg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.w*.5);
      fg.addColorStop(0,`rgba(195,210,222,${p.a})`);fg.addColorStop(1,'rgba(195,210,222,0)');
      ctx.fillStyle=fg;ctx.fillRect(p.x-p.w*.5,p.y-p.h*.5,p.w,p.h);
    } else if(p.t==='cloud'){
      p.x+=p.spd;if(p.x>W+p.w*.6)p.x=-p.w*.6;
      const col=p.dark?`rgba(40,52,68,${p.a})`:`rgba(205,218,238,${p.a})`;
      ctx.fillStyle=col;
      ctx.beginPath();ctx.ellipse(p.x,p.y,p.w*.5,p.h*.4,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(p.x-p.w*.17,p.y+p.h*.06,p.w*.31,p.h*.36,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(p.x+p.w*.19,p.y+p.h*.08,p.w*.27,p.h*.3,0,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  });
}

function anim(ts){ctx.clearRect(0,0,cvs.width,cvs.height);drawFrame(ts);requestAnimationFrame(anim);}

// ═══════ CLOCK ═══════
function tick(){
  const now=new Date();
  document.getElementById('cf').textContent=`${p2(now.getHours())}:${p2(now.getMinutes())}`;
  document.getElementById('cs').textContent=p2(now.getSeconds());
  const L=T[S.lang];
  document.getElementById('dstr').textContent=`${L.ds[now.getDay()]}, ${now.getDate()} ${L.ms[now.getMonth()]} ${now.getFullYear()}`;
  checkAlarms(now);
  updateArc();
  if(S.weather&&S.sunrise&&S.sunset){
    const isDay=now>=S.sunrise&&now<=S.sunset;
    const sc=getScene(S.weather.code,isDay);
    if(sc!==curScene)initParts(sc);
  }
}

// ═══════ SUN ARC ═══════
function updateArc(){
  if(!S.sunrise||!S.sunset)return;
  const t2=Math.max(0,Math.min(1,(Date.now()-S.sunrise.getTime())/(S.sunset.getTime()-S.sunrise.getTime())));
  const Px=[10,100,190],Py=[60,-5,60];
  const bx=(p,t)=>(1-t)*(1-t)*p[0]+2*(1-t)*t*p[1]+t*t*p[2];
  const by=(p,t)=>(1-t)*(1-t)*p[0]+2*(1-t)*t*p[1]+t*t*p[2];
  const sx=bx(Px,t2),sy=by(Py,t2);
  document.getElementById('sd').setAttribute('cx',sx);document.getElementById('sd').setAttribute('cy',sy);
  let d='M10,60';const steps=Math.ceil(t2*30);
  for(let i=1;i<=steps;i++){const tt=i/30;d+=` L${bx(Px,tt).toFixed(1)},${by(Py,tt).toFixed(1)}`;}
  document.getElementById('ap').setAttribute('d',d);
  const fm=d=>`${p2(d.getHours())}:${p2(d.getMinutes())}`;
  document.getElementById('sr').textContent=fm(S.sunrise);
  document.getElementById('ss').textContent=fm(S.sunset);
}

// ═══════ APIS ═══════
async function fetchOM(lat,lon,model){
  const pm=new URLSearchParams({latitude:lat,longitude:lon,
    current:'temperature_2m,apparent_temperature,wind_speed_10m,wind_direction_10m,weather_code,precipitation,surface_pressure,relative_humidity_2m',
    daily:'sunrise,sunset',wind_speed_unit:'kmh',timezone:'auto',...(model?{models:model}:{})});
  const r=await fetch(`https://api.open-meteo.com/v1/forecast?${pm}`,{signal:AbortSignal.timeout(9000)});
  if(!r.ok)throw new Error(r.status);
  const d=await r.json(),c=d.current;
  return{temp:c.temperature_2m,feels:c.apparent_temperature,wind:c.wind_speed_10m,wdir:c.wind_direction_10m,
    code:c.weather_code,prec:c.precipitation,pres:c.surface_pressure,hum:c.relative_humidity_2m,
    sunrise:d.daily?.sunrise?.[0],sunset:d.daily?.sunset?.[0],src:model==='ecmwf_ifs025'?'ECMWF':'GFS'};
}
async function fetchWttr(lat,lon){
  const r=await fetch(`https://wttr.in/${lat.toFixed(4)},${lon.toFixed(4)}?format=j1`,{signal:AbortSignal.timeout(9000)});
  if(!r.ok)throw new Error(r.status);
  const d=await r.json(),c=d.current_condition[0];
  return{temp:parseFloat(c.temp_C),feels:parseFloat(c.FeelsLikeC),wind:parseFloat(c.windspeedKmph),wdir:null,
    code:null,prec:parseFloat(c.precipMM),pres:parseFloat(c.pressure),hum:parseFloat(c.humidity),src:'WTTR'};
}
function dc(d){return['N','NE','E','SE','S','SO','O','NO'][Math.round(d/45)%8];}

async function loadWeather(){
  setBdg('bg','');setBdg('be','');setBdg('bw','');
  document.getElementById('lb').classList.remove('h');
  document.getElementById('err').textContent='';
  const [r1,r2,r3]=await Promise.allSettled([fetchOM(S.lat,S.lon,null),fetchOM(S.lat,S.lon,'ecmwf_ifs025'),fetchWttr(S.lat,S.lon)]);
  setBdg('bg',r1.status==='fulfilled'?'ok':'fail');
  setBdg('be',r2.status==='fulfilled'?'ok':'fail');
  setBdg('bw',r3.status==='fulfilled'?'ok':'fail');
  const ok=[r1,r2,r3].filter(r=>r.status==='fulfilled').map(r=>r.value);
  if(!ok.length){document.getElementById('err').textContent='Sin conexión meteorológica.';document.getElementById('lb').classList.add('h');return;}
  const avg=k=>ok.reduce((s,d)=>s+(parseFloat(d[k])||0),0)/ok.length;
  const src=[r1,r2].find(r=>r.status==='fulfilled'&&r.value.sunrise);
  if(src){S.sunrise=new Date(src.value.sunrise);S.sunset=new Date(src.value.sunset);}
  const code=ok.find(d=>d.code!=null)?.code??2;
  const isDay=S.sunrise&&S.sunset?Date.now()>=S.sunrise.getTime()&&Date.now()<=S.sunset.getTime():true;
  S.weather={temp:avg('temp'),feels:avg('feels'),wind:avg('wind'),wdir:ok.find(d=>d.wdir!=null)?.wdir??0,
    code,prec:avg('prec'),pres:avg('pres'),hum:avg('hum')};
  const sc=getScene(code,isDay);
  if(sc!==curScene)initParts(sc);
  renderW();
  document.getElementById('lb').classList.add('h');
}

function c2f(c){return Math.round(c*9/5+32);}
function ft(c){const v=Math.round(c);return S.unit==='F'?`${c2f(v)}°F`:`${v>0?'+':''}${v}°C`;}

const WICO={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌦️',
  61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',
  85:'🌨️',86:'🌨️',95:'⛈️',96:'⛈️',99:'⛈️'};

function renderW(){
  if(!S.weather)return;
  const w=S.weather,L=T[S.lang];
  document.getElementById('tg').textContent=ft(w.temp);
  document.getElementById('wi').textContent=WICO[w.code]||'🌡️';
  document.getElementById('cond').textContent=L.cond[w.code]||T.es.cond[w.code]||'—';
  document.getElementById('feels').innerHTML=`${tl('feels')}: <span class="fv">${ft(w.feels)}</span>`;
  document.getElementById('sv-wind').textContent=`${Math.round(w.wind)} km/h`;
  document.getElementById('sv-wdir').textContent=dc(w.wdir);
  document.getElementById('sv-hum').textContent=`${Math.round(w.hum)}%`;
  document.getElementById('sv-prec').textContent=`${w.prec.toFixed(1)} mm`;
  document.getElementById('sv-pres').textContent=`${Math.round(w.pres)}`;
}
function setBdg(id,st){const el=document.getElementById(id);el.className='bdg'+(st==='ok'?' ok':st==='fail'?' fail':'');}

// ═══════ GEO ═══════
function getLoc(){
  if(!navigator.geolocation){document.getElementById('locn').textContent='No disponible';return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    S.lat=pos.coords.latitude;S.lon=pos.coords.longitude;
    revGeo();loadWeather();
    setInterval(loadWeather,15*60*1000);setInterval(updateArc,30000);
  },()=>{document.getElementById('locn').textContent='Sin permiso';document.getElementById('lb').classList.add('h');},{enableHighAccuracy:true,timeout:12000});
}
async function revGeo(){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${S.lat}&lon=${S.lon}&format=json&accept-language=${S.lang}`);
    const d=await r.json(),a=d.address;
    document.getElementById('locn').textContent=(a.city||a.town||a.village||a.county||'')+', '+(a.country_code||'').toUpperCase();
  }catch{document.getElementById('locn').textContent=`${S.lat.toFixed(2)}°, ${S.lon.toFixed(2)}`;}
}

// ═══════ LANG ═══════
function setLang(lang){
  S.lang=lang;localStorage.setItem('ws_lang',lang);
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.dataset.lang===lang));
  const L=T[lang];
  document.getElementById('lt-wind').textContent=L.wind;
  document.getElementById('lt-hum').textContent=L.hum;
  document.getElementById('lt-prec').textContent=L.prec;
  document.getElementById('lt-pres').textContent=L.pres;
  document.getElementById('lt-rel').textContent=L.rel;
  document.getElementById('lt-ph').textContent=L.ph;
  document.getElementById('lt-arc').textContent=L.arc;
  document.getElementById('lt-sr').textContent=L.sr;
  document.getElementById('lt-ss').textContent=L.ss;
  document.getElementById('lt-alarms').textContent=L.alarms;
  document.getElementById('lt-new').textContent=L.newAl;
  document.getElementById('lt-new2').textContent=L.newAl;
  document.getElementById('lt-cancel').textContent=L.cancel;
  document.getElementById('lt-surf').textContent=L.surf;
  document.getElementById('alinp').placeholder=L.placeholder;
  renderW();tick();
  if(S.lat)revGeo();
}

// ═══════ ALARMS ═══════
function saveAlarms(){localStorage.setItem('ws_alarms',JSON.stringify(S.alarms));}
function renderAlarms(){
  const el=document.getElementById('alist');el.innerHTML='';
  if(!S.alarms.length){el.innerHTML='<div style="text-align:center;padding:22px;opacity:.3;font-size:13px">—</div>';return;}
  [...S.alarms].sort((a,b)=>a.h*60+a.m-(b.h*60+b.m)).forEach((al,i)=>{
    const d=document.createElement('div');d.className='aitem';
    d.innerHTML=`<div><div class="atim">${p2(al.h)}:${p2(al.m)}</div><div class="albl">${al.label||tl('newAl')}</div></div><div class="ar"><label class="tog"><input type="checkbox" ${al.enabled?'checked':''} data-i="${i}" class="atog"><span class="tsl"></span></label><div class="adel" data-i="${i}">✕</div></div>`;
    el.appendChild(d);
  });
  el.querySelectorAll('.adel').forEach(b=>b.addEventListener('click',e=>{S.alarms.splice(parseInt(e.currentTarget.dataset.i),1);saveAlarms();renderAlarms();}));
  el.querySelectorAll('.atog').forEach(cb=>cb.addEventListener('change',e=>{S.alarms[parseInt(e.target.dataset.i)].enabled=e.target.checked;saveAlarms();}));
}
function checkAlarms(now){
  if(now.getSeconds()!==0)return;
  const hm=now.getHours()*60+now.getMinutes();
  S.alarms.filter(a=>a.enabled&&a.h*60+a.m===hm).forEach(al=>{
    if('Notification'in window&&Notification.permission==='granted')new Notification(`⏰ ${al.label||'Alarma'}`,{body:`${p2(al.h)}:${p2(al.m)}`});
    if('vibrate'in navigator)navigator.vibrate([300,100,300,100,300]);
  });
}

// ═══════ CALENDAR ═══════
function renderCal(){
  const y=S.calY,m=S.calM,L=T[S.lang];
  document.getElementById('cmth').textContent=`${L.months[m]} ${y}`;
  const g=document.getElementById('cgrid');g.innerHTML='';
  L.days.forEach(d=>{const el=document.createElement('div');el.className='cdow';el.textContent=d.slice(0,2);g.appendChild(el);});
  const first=new Date(y,m,1).getDay(),total=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
  const td=new Date();
  for(let i=first-1;i>=0;i--){const el=document.createElement('div');el.className='cday om';el.textContent=prev-i;g.appendChild(el);}
  for(let d=1;d<=total;d++){const el=document.createElement('div');el.className='cday';if(d===td.getDate()&&m===td.getMonth()&&y===td.getFullYear())el.classList.add('today');el.textContent=d;g.appendChild(el);}
  const cells=Math.ceil((first+total)/7)*7;
  for(let i=first+total;i<cells;i++){const el=document.createElement('div');el.className='cday om';el.textContent=i-first-total+1;g.appendChild(el);}
}

// ═══════ OVERLAYS ═══════
function oo(id){document.getElementById(id).classList.add('open');}
function co(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

function rp(){document.getElementById('ph').textContent=p2(S.ph);document.getElementById('pm').textContent=p2(S.pm);}

// ═══════ INIT ═══════
function init(){
  if('serviceWorker'in navigator){try{const sw='self.addEventListener("install",e=>self.skipWaiting());self.addEventListener("activate",e=>clients.claim());';const b=new Blob([sw],{type:'application/javascript'});navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});}catch(e){}}
  if('Notification'in window&&Notification.permission==='default')Notification.requestPermission().catch(()=>{});

  document.querySelectorAll('.lb').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
  document.getElementById('clk').addEventListener('click',()=>{renderAlarms();oo('alOv');});
  document.getElementById('calBtn').addEventListener('click',()=>{S.calY=new Date().getFullYear();S.calM=new Date().getMonth();renderCal();oo('calOv');});
  document.getElementById('addbtn').addEventListener('click',()=>{const n=new Date();S.ph=n.getHours();S.pm=0;rp();oo('addOv');});
  document.getElementById('hu').addEventListener('click',()=>{S.ph=(S.ph+1)%24;rp();});
  document.getElementById('hd').addEventListener('click',()=>{S.ph=(S.ph+23)%24;rp();});
  document.getElementById('mu').addEventListener('click',()=>{S.pm=(S.pm+1)%60;rp();});
  document.getElementById('md').addEventListener('click',()=>{S.pm=(S.pm+59)%60;rp();});
  document.getElementById('savebtn').addEventListener('click',()=>{S.alarms.push({h:S.ph,m:S.pm,label:document.getElementById('alinp').value.trim(),enabled:true});saveAlarms();document.getElementById('alinp').value='';co('addOv');renderAlarms();});
  document.getElementById('cprev').addEventListener('click',()=>{S.calM--;if(S.calM<0){S.calM=11;S.calY--;}renderCal();});
  document.getElementById('cnext').addEventListener('click',()=>{S.calM++;if(S.calM>11){S.calM=0;S.calY++;}renderCal();});

  setLang(S.lang);
  initParts('cd');
  requestAnimationFrame(anim);
  tick();setInterval(tick,1000);
  getLoc();
}
document.addEventListener('DOMContentLoaded',init);
</script>
