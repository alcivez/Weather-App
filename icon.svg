<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0d2137"/>
  <!-- Gradient overlay -->
  <defs>
    <radialGradient id="g1" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a4a6e"/>
      <stop offset="100%" stop-color="#06101e"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#g1)"/>
  <!-- Sun -->
  <circle cx="200" cy="210" r="60" fill="#f39c12" opacity="0.95"/>
  <!-- Sun rays -->
  <g stroke="#f39c12" stroke-width="10" stroke-linecap="round" opacity="0.6">
    <line x1="200" y1="120" x2="200" y2="100"/>
    <line x1="200" y1="300" x2="200" y2="320"/>
    <line x1="110" y1="210" x2="90" y2="210"/>
    <line x1="290" y1="210" x2="310" y2="210"/>
    <line x1="137" y1="147" x2="123" y2="133"/>
    <line x1="263" y1="273" x2="277" y2="287"/>
    <line x1="263" y1="147" x2="277" y2="133"/>
    <line x1="137" y1="273" x2="123" y2="287"/>
  </g>
  <!-- Cloud -->
  <ellipse cx="290" cy="290" rx="100" ry="55" fill="#4fc3f7" opacity="0.9"/>
  <ellipse cx="240" cy="275" rx="70" ry="50" fill="#4fc3f7" opacity="0.9"/>
  <ellipse cx="320" cy="268" rx="60" ry="45" fill="#81d4fa" opacity="0.85"/>
  <ellipse cx="290" cy="310" rx="100" ry="40" fill="#4fc3f7"/>
